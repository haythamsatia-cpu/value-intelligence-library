{% extends 'base.html' %}
{% block title %}New Ingestion Job{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="h3 mb-0">New Document Ingestion Job</h1>
    <p class="text-muted">Upload a PDF for text extraction, or choose Manual text to paste content later.</p>
</div>
<div class="detail-section">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% include 'includes/form_fields.html' %}
        <button type="submit" class="btn btn-primary">Create job</button>
        <a href="{% url 'ai_extraction:ingestion_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
