{% extends 'base.html' %}
{% block title %}{% if object %}Edit{% else %}Add{% endif %} Prompt Template{% endblock %}
{% block content %}
<div class="page-header"><h1 class="h3 mb-0">{% if object %}Edit{% else %}Add{% endif %} Prompt Template</h1></div>
<div class="detail-section">
    <form method="post">{% csrf_token %}{% include 'includes/form_fields.html' %}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% if object %}{% url 'ai_extraction:prompt_detail' object.pk %}{% else %}{% url 'ai_extraction:prompt_list' %}{% endif %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
