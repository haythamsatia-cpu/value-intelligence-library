{% extends 'base.html' %}
{% block title %}{% if object %}Edit{% else %}Add{% endif %} Subdomain{% endblock %}
{% block content %}
<div class="page-header"><h1 class="h3 mb-0">{% if object %}Edit Subdomain{% else %}Add Subdomain{% endif %}</h1></div>
<div class="detail-section">
    <form method="post">{% csrf_token %}{% include 'includes/form_fields.html' %}
        <button type="submit" class="btn btn-primary">Save</button>
        <a href="{% url 'taxonomy:subdomain_list' %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
