{% extends 'base.html' %}
{% block title %}Concepts — Value Intelligence Library{% endblock %}
{% block content %}
<div class="page-header d-flex justify-content-between align-items-center">
    <div><h1 class="h3 mb-0">Concepts</h1><p class="text-muted mb-0"><a href="{% url 'taxonomy:index' %}">← Taxonomy</a></p></div>
    <a href="{% url 'taxonomy:concept_create' %}" class="btn btn-primary">Add Concept</a>
</div>
<div class="table-card">
    <table class="table table-hover mb-0">
        <thead class="table-light"><tr><th>Topic</th><th>Name</th><th></th></tr></thead>
        <tbody>
            {% for item in items %}
            <tr>
                <td>{{ item.topic }}</td>
                <td>{{ item.name }}</td>
                <td>
                    <a href="{% url 'taxonomy:concept_update' item.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <a href="{% url 'taxonomy:concept_delete' item.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="3" class="text-center text-muted py-4">No concepts yet.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
