{% extends 'base.html' %}
{% block title %}Delete Knowledge Unit — Value Intelligence Library{% endblock %}
{% block content %}
<div class="detail-section">
    <h1 class="h4">Delete Knowledge Unit</h1>
    <p>Are you sure you want to delete <strong>{{ knowledge_unit.title }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Delete</button>
        <a href="{% url 'knowledge:knowledgeunit_detail' knowledge_unit.pk %}" class="btn btn-outline-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
