{% extends 'base.html' %}
{% block title %}{% if object %}Edit{% else %}Add{% endif %} Source — Value Intelligence Library{% endblock %}
{% block content %}
<div class="page-header">
    <h1 class="h3 mb-0">{% if object %}Edit Source{% else %}Add Source{% endif %}</h1>
</div>
<div class="detail-section">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% include 'includes/form_fields.html' %}
        <div class="d-flex gap-2">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% if object %}{% url 'library:source_detail' object.pk %}{% else %}{% url 'library:source_list' %}{% endif %}" class="btn btn-outline-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
